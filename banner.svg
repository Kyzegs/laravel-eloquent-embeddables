    <rect x="8" y="8" width="1664" height="368" fill="url(#glow)"/>

    <rect x="8" y="300" width="1664" height="76" fill="#0b0710"/>
    <rect x="8" y="300" width="1664" height="1" fill="#2e1d40"/>
    <rect x="40" y="320" width="1600" height="40" fill="url(#dots)" mask="url(#dotfade)"/>

    <rect x="1300" y="298" width="372" height="3" fill="url(#accent)"/>

