<svg width="1680" height="384" viewBox="0 0 1680 384" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'SF Pro Display','Segoe UI',Inter,system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#140d1a"/>
      <stop offset="1" stop-color="#0a060d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#9333ea" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#9333ea" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#7e22ce"/>
    </linearGradient>
    <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#2a1a3a"/>
    </pattern>
    <linearGradient id="dotfadegrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.5" stop-color="#fff"/>
      <stop offset="0.6" stop-color="#000"/>
    </linearGradient>
    <mask id="dotfade"><rect x="40" y="320" width="1600" height="40" fill="url(#dotfadegrad)"/></mask>
    <clipPath id="round"><rect x="8" y="8" width="1664" height="368" rx="28"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
